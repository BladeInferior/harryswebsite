<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Completions</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/app-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Collection Hub">
    <meta name="theme-color" content="#14161a">

    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="item-page completions-page">

    <div id="navbar"></div>

    <script src="collection-nav.js"></script>

    <a class="back-button" href="collectionhub.html">← Back</a>

    <h1>Completions</h1>

    <!-- =========================
        SEARCH
    ========================== -->
    <div id="search-wrapper">
        <div id="search-row">
            <input id="search" type="text" placeholder="Search Sleeves..." />
            <span id="clear-search">✕</span>
        </div>
    </div>

    <button id="untagged-filter">Untagged</button>

    <!-- =========================
        MODE + PAGINATION 
    ========================== -->

    
    <div id="page-controls">

        <button id="list-mode">List Mode</button>
        <button id="page-mode">Page Mode</button>

        <div id="pagination-controls">

            <button id="prev-page">◀</button>
            <span id="page-display">1</span>
            <button id="next-page">▶</button>

        </div>

        <button id="add-item">Add Completion</button>
        <input type="file" id="import-items" accept=".json" hidden>
        <button id="import-button">Import</button>
        <button id="export-items">Export</button>
        <button id="stats-btn">Stats</button>

    </div>

    <!-- =========================
        GRID
    ========================== -->
    <div id="box-container"></div>

    <div id="add-item-modal" class="hidden">

        <div class="add-item-box">

            <h2 id="item-modal-title">Add Completion</h2>

            <div id="item-error" class="hidden"></div>

            <label>
                Title
                <input type="text" id="item-title">
            </label>

            <label>
                Completion Date
                <input type="date" id="item-date">
            </label>

            <label>
                Franchise
                <input type="text" id="item-custom">
            </label>

            <label>
                Tags (comma separated)
                <input type="text" id="item-tags">
            </label>

            <button id="preview-image-btn">View Image</button>

            <div class="modal-buttons">
                <button id="save-item">Save</button>
                <button id="cancel-item">Cancel</button>
            </div>

        </div>

    </div>

    <div id="add-dlc-modal" class="hidden">

        <div class="add-item-box">

            <h2>Add DLC</h2>

            <label>
                DLC Image Name
                <input type="text" id="dlc-name">
            </label>

            <div id="dlc-error" class="hidden"></div>

            <div class="modal-buttons">
                <button id="save-dlc">Save</button>
                <button id="cancel-dlc">Cancel</button>
            </div>

        </div>

    </div>

    <div id="delete-dlc-modal" class="hidden">

        <div class="add-item-box">
            
            <h3>Delete DLC</h3>

            <div id="delete-dlc-list"></div>

            <div class="modal-buttons">
                <button id="confirm-delete-dlc">Delete</button>
                <button id="cancel-delete-dlc">Cancel</button>
            </div>

            <div id="delete-dlc-error"></div>
        </div>
    </div>

    <!-- =========================
        MODAL
    ========================== -->
    <div id="modal-overlay" class="hidden">

        <div id="modal-nav-left" class="modal-nav">◀</div>

        <div id="pokemon-modal">

            <div id="modal-close" class="modal-close-btn">✕</div>

            <div class="modal-left">

                <div id="modal-title"></div>

                <img id="modal-image" src="">

            </div>

            <div class="modal-right">

                <div class="item-field">
                    <strong>Completion Date:</strong>
                    <div id="modal-date"></div>
                </div>

                <div class="item-field">
                    <strong>Franchise:</strong>
                    <div id="modal-custom"></div>
                </div>

                <div class="item-field">
                    <strong>Tags:</strong>
                    <div id="modal-tags"></div>
                </div>

                <div class="item-actions">

                    <button id="edit-item" class="item-action-btn">Edit Completion</button>
                    <button id="delete-item" class="item-action-btn danger">Delete Completion</button>

                    <div class="dlc-editor">
                        <div class="dlc-header">
                            <button id="delete-dlcs-btn" class="dlc-delete-btn">Delete DLC</button>
                            <h3>DLCs</h3>
                            <button id="add-dlc-btn">Add DLC</button>
                        </div>

                        <div id="modal-dlc-list"></div>

                    </div>

                </div>

            </div>

        </div>

        <div id="modal-nav-right" class="modal-nav">▶</div>

    </div>

    <div id="image-zoom-overlay" class="hidden">
        <img id="zoom-image" />
    </div>

    <div id="stats-modal" class="stats-modal-overlay hidden">
        <div class="stats-modal-box">
            <div id="stats-modal-close" class="modal-close-btn">✕</div>
            <h2>Completion Stats</h2>
            <div id="stats-modal-body"></div>
        </div>
    </div>

    <div id="stats-detail-modal" class="stats-modal-overlay hidden">
        <div class="stats-modal-box">
            <div id="stats-detail-modal-close" class="modal-close-btn">✕</div>
            <h2 id="stats-detail-modal-title"></h2>
            <div id="stats-detail-modal-body"></div>
        </div>
    </div>

    <script>
    const COLLECTION = {
        name: "completions",
        storageKey: "completions",
        jsonFile: "completions-backup.json",
        imageFolder: "completions",
        
        fields: {
            title: "title",
            date: "dateCompleted",
            custom: "franchise",
            tags: "tags"
        },

    };
    </script>

    <script src="mobile-popout.js"></script>
    <script src="collections.js"></script>

<script src="../scroll-to-top.js"></script>
</body>
</html>
