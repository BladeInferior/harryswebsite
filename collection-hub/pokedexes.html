<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pokemon Tracker</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/app-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Collection Hub">
    <meta name="theme-color" content="#14161a">

    <link rel="stylesheet" href="../navbar.css">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="pokemon-page">

    <div id="navbar"></div>

    <script src="collection-nav.js"></script>

    <a class="back-button" href="collectionhub.html">← Back</a>

    <div id="dex-key">
        <div class="dex-key-title">Key</div>
        <div class="dex-key-item">
            <span class="dex-key-swatch dex-key-swatch--blue"></span>
            <span>All 5 dexes</span>
        </div>
        <div class="dex-key-item">
            <span class="dex-key-swatch dex-key-swatch--green"></span>
            <span>All 5 dexes + all shiny constraints</span>
        </div>
    </div>

    <h1>Pokemon HOME Tracker</h1>

    <div id="search-wrapper">
        <div id="search-row">
            <input id="search" type="text" placeholder="Search Pokémon..." />
            <span id="clear-search">✕</span>
        </div>
    </div>

    <div id="progress-container"></div>

    <div id="page-controls">

        <button id="list-mode">List Mode</button>
        <button id="page-mode">Page Mode</button>
        <input type="file" id="import-pokedex" accept=".json" hidden>
        <button id="import-button">Import</button>
        <button id="export-pokedex">Export Pokémon</button>
        <button id="stats-btn">Stats</button>

        <div id="pagination-controls" class="hidden">

            <button id="prev-page">◀</button>
            <span id="page-display">1</span>
            <button id="next-page">▶</button>

        </div>

    </div>

    <div id="box-container"></div>

    <div id="game-filter-container"></div>

    <div id="modal-overlay" class="hidden">

        <div id="modal-nav-left" class="modal-nav">◀</div>

        <div id="pokemon-modal">

            <div id="modal-close" class="modal-close-btn">✕</div>

            <div class="modal-left">

                <div id="modal-name"></div>

                <img id="modal-image" src="">

            </div>

            <div class="modal-right">

                <div class="dex-entry inactive" data-dex="masterDex">
                    <div class="dex-icon">📘</div>
                    <div class="dex-name">MasterDex</div>
                </div>

                <div class="dex-entry inactive" data-dex="shinyDex">

                    <div class="dex-icon">✨</div>
                    <div class="dex-name">Shiny Dex</div>

                </div>

                <div class="shiny-variants">

                    <div class="variant" data-variant="correctStage">
                        <img class="dot"src="icons/rampardos.png">
                        <span class="label">Correct Stage</span>
                    </div>

                    <div class="variant" data-variant="originalRegion">
                        <img class="dot"src="icons/Arceus_mark_HOME.png">
                        <span class="label">Original Region</span>
                    </div>

                    <div class="variant" data-variant="luxuryBall">
                        <img class="dot"src="icons/luxuryball.png">
                        <span class="label">Luxury Ball</span>
                    </div>

                </div>

                <div class="dex-entry inactive" data-dex="tradeDex">
                    <div class="dex-icon">🔄</div>
                    <div class="dex-name">Trade Dex</div>
                </div>

                <div class="dex-entry inactive" data-dex="wonderTradeDex">
                    <div class="dex-icon">🎁</div>
                    <div class="dex-name">Wonder Trade Dex</div>
                </div>

                <div class="dex-entry inactive" data-dex="pogoDex">
                    <div class="dex-icon">📱</div>
                    <div class="dex-name">PoGo Dex</div>
                </div>

                <div class="dex-entry inactive" data-dex="cherishDex">
                    <div class="dex-icon">🏀</div>
                    <div class="dex-name">Cherish Dex</div>
                </div>

            </div>

        </div>

        <div id="modal-nav-right" class="modal-nav">▶</div>

    </div>

    <div id="stats-modal" class="stats-modal-overlay hidden">
        <div class="stats-modal-box">
            <div id="stats-modal-close" class="modal-close-btn">✕</div>
            <h2>Pokédex Stats</h2>
            <div id="stats-modal-body"></div>
        </div>
    </div>

    <script src="mobile-popout.js"></script>
    <script src="pokedexes.js"></script>

<script src="../scroll-to-top.js"></script>
</body>
</html>
