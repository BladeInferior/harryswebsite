<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Join</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#121212;
            --card:#1e1e1e;
            --card-hover:#262626;
            --gold:#d4af37;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#333;
            --correct:#3fb950;
            --incorrect:#e5534b;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        [hidden]{
            display:none !important;
        }

        .back-button{
            display:inline-block;
            margin:90px 0 0 20px;
            padding:6px 10px;
            border-radius:8px;
            background:#2d2d2d;
            border:1px solid #555;
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:.15s ease;
        }

        .back-button:hover{
            border-color:var(--gold);
            background:rgba(212,175,55,.15);
        }

        .hero{
            text-align:center;
            padding:100px 20px 20px;
        }

        .hero p{
            max-width:500px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        .section{
            max-width:460px;
            margin:auto;
            padding:20px 20px 60px;
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:30px;
        }

        label{
            display:block;
            margin-bottom:6px;
            color:var(--secondary);
            font-size:.9rem;
        }

        input[type="text"]{
            width:100%;
            padding:12px 14px;
            border-radius:8px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:1rem;
            margin-bottom:16px;
        }

        input[type="text"]:focus{
            outline:none;
            border-color:var(--gold);
        }

        .btn{
            display:block;
            width:100%;
            box-sizing:border-box;
            background:var(--gold);
            color:#121212;
            border:none;
            border-radius:10px;
            padding:14px;
            font-size:1rem;
            font-weight:bold;
            text-align:center;
            text-decoration:none;
            cursor:pointer;
        }

        .btn:hover:not(:disabled){
            background:#e6c458;
        }

        .btn:disabled{
            opacity:.5;
            cursor:default;
        }

        .btn-secondary{
            background:transparent;
            border:1px solid var(--border);
            color:var(--text);
            margin-top:10px;
        }

        .btn-secondary:hover{
            border-color:var(--gold);
        }

        #join-status,
        #send-status{
            margin-top:14px;
            text-align:center;
            min-height:20px;
        }

        #join-status.pending,
        #send-status.pending{
            color:var(--secondary);
        }

        #join-status.success,
        #send-status.success{
            color:var(--correct);
        }

        #join-status.failure{
            color:var(--incorrect);
        }

        #waiting-section h2,
        #ended-section h2,
        #host-screen-section h2{
            text-align:center;
            margin-bottom:6px;
        }

        #waiting-section p,
        #host-screen-section p{
            text-align:center;
            color:var(--secondary);
            margin-bottom:20px;
        }

        #ended-section p{
            text-align:center;
            color:var(--secondary);
            margin-bottom:20px;
        }

        /* --- category title / example screens --- */
        .card.themed-bg{
            position:relative;
            background-size:cover;
            background-position:center;
            overflow:hidden;
        }

        .card.themed-bg::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(18,18,18,.82);
            border-radius:16px;
            z-index:0;
        }

        .card.themed-bg > *{
            position:relative;
            z-index:1;
        }

        #player-category-intro-label{
            text-align:center;
            font-size:1.5rem;
            margin-bottom:16px;
        }

        #player-category-intro-text{
            text-align:center;
            color:var(--secondary);
            line-height:1.6;
        }

        /* --- in-quiz question + answer UI --- */

        #player-question-progress{
            text-align:center;
            color:var(--secondary);
            margin-bottom:10px;
        }

        #player-question-prompt{
            text-align:center;
            font-size:1.3rem;
            margin-bottom:16px;
            line-height:1.4;
        }

        #player-question-media img{
            display:block;
            max-width:160px;
            max-height:160px;
            margin:0 auto 16px;
            border-radius:8px;
        }

        #player-question-media img.silhouette{
            filter:brightness(0);
        }

        .text-answer-input,
        .mc-dropdown{
            width:100%;
            padding:12px 14px;
            border-radius:8px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:1rem;
            margin-bottom:16px;
        }

        .text-answer-input:focus,
        .mc-dropdown:focus{
            outline:none;
            border-color:var(--gold);
        }

        .answer-option-list{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
            gap:12px;
            margin-bottom:16px;
        }

        .answer-option{
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:10px;
            padding:14px;
            color:var(--text);
            font-size:1rem;
            cursor:pointer;
            transition:.15s;
        }

        .answer-option:hover:not(:disabled){
            border-color:var(--gold);
        }

        .answer-option.selected{
            border-color:var(--gold);
            background:var(--card-hover);
        }

        .image-option-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
            gap:12px;
            margin-bottom:16px;
        }

        .image-option{
            padding:10px;
        }

        .image-option img{
            width:100%;
            height:auto;
            display:block;
        }

        .ordering-list{
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:16px;
        }

        .ordering-item{
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:10px;
            padding:12px 16px;
        }

        .ordering-item-controls button{
            background:var(--card);
            border:1px solid var(--border);
            color:var(--text);
            border-radius:6px;
            width:32px;
            height:32px;
            margin-left:6px;
            cursor:pointer;
        }

        .ordering-item-controls button:disabled{
            opacity:.3;
            cursor:default;
        }

        #locked-view,
        #reveal-view{
            text-align:center;
            padding:20px;
            border-radius:10px;
            background:var(--bg);
            border:1px solid var(--border);
        }

        #locked-your-answer{
            color:var(--gold);
            font-weight:bold;
            margin-bottom:8px;
        }

        #locked-status{
            color:var(--secondary);
            margin-bottom:14px;
        }

        #back-btn{
            margin-top:0;
        }

        #reveal-view.correct{
            border-color:var(--correct);
            background:rgba(63,185,80,.15);
            color:var(--correct);
            font-weight:bold;
        }

        #reveal-view.incorrect{
            border-color:var(--incorrect);
            background:rgba(229,83,75,.15);
            color:var(--incorrect);
            font-weight:bold;
        }

        #reveal-view .explanation{
            display:block;
            margin-top:8px;
            font-weight:normal;
            color:var(--secondary);
        }

        #player-score{
            text-align:center;
            color:var(--gold);
            margin-bottom:16px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script>
fetch('../navbar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('navbar').innerHTML = data;

        const basePath =
            window.location.hostname === "bladeinferior.github.io"
                ? "/harryswebsite/"
                : "/";

        document.querySelectorAll('#navbar [data-page]').forEach(link => {
            link.href = basePath + link.dataset.page;
        });
    });
</script>

<a class="back-button" href="quizhub.html">← Back</a>

<section class="hero" id="join-hero">
    <p id="join-hero-text">Enter the code shown on the host's screen to join the quiz.</p>
</section>

<section class="section">
    <div class="card" id="join-card">

        <form id="join-form">
            <label for="name-input">Your name</label>
            <input type="text" id="name-input" autocomplete="off" required>

            <div id="code-field-wrapper">
                <label for="code-input">Join code</label>
                <input type="text" id="code-input" inputmode="numeric" autocomplete="off" required>
            </div>

            <button type="submit" class="btn">Join</button>
            <div id="join-status"></div>
        </form>

        <div id="waiting-section" hidden>
            <h2>You're in!</h2>
            <p>Waiting for the host to begin the quiz...</p>

            <form id="message-form">
                <label for="message-input">Send a message to the host</label>
                <input type="text" id="message-input" autocomplete="off" required>

                <button type="submit" class="btn">Send</button>
                <div id="send-status"></div>
            </form>
        </div>

        <div id="host-screen-section" hidden>
            <h2>👀 Look at the host's screen</h2>
            <p id="host-screen-message"></p>
        </div>

        <div id="category-intro-section" hidden>
            <h2 id="player-category-intro-label"></h2>
            <p id="player-category-intro-text"></p>
        </div>

        <div id="quiz-section" hidden>
            <div id="player-score"></div>
            <p id="player-question-progress"></p>
            <h2 id="player-question-prompt"></h2>
            <div id="player-question-media"></div>

            <div id="answer-mount"></div>

            <div id="answer-actions">
                <button id="send-answer-btn" class="btn" type="button">Send Answer</button>
            </div>

            <div id="locked-view" hidden>
                <p id="locked-your-answer" hidden></p>
                <p id="locked-status"></p>
                <button id="back-btn" class="btn btn-secondary" type="button" hidden>Back / Edit Answer</button>
            </div>

            <div id="reveal-view" hidden></div>
        </div>

        <div id="ended-section" hidden>
            <h2>Quiz Complete!</h2>
            <p id="final-score"></p>
            <a href="join.html" class="btn">Play Another Quiz</a>
        </div>

    </div>
</section>

<script src="engine/answer-types.js"></script>
<script type="module" src="join.js"></script>

</body>
</html>
