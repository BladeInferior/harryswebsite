<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Manage Quizzes</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#121212;
            --card:#1e1e1e;
            --card-hover:#262626;
            --gold:#d4af37;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#333;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        .back-button{
            display:inline-block;
            margin:90px 0 0 20px;
            padding:6px 10px;
            border-radius:8px;
            background:#2d2d2d;
            border:1px solid #555;
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:.15s ease;
        }

        .back-button:hover{
            border-color:var(--gold);
            background:rgba(212,175,55,.15);
        }

        .hero{
            text-align:center;
            padding:60px 20px 30px;
        }

        .hero h1{
            font-size:2.2rem;
            margin-bottom:10px;
        }

        .hero p{
            max-width:600px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        .section{
            max-width:1000px;
            margin:auto;
            padding:20px 20px 60px;
        }

        .card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:20px;
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:25px;
        }

        .card:hover{
            background:var(--card-hover);
            border-color:var(--gold);
        }

        .card h3{
            margin-bottom:10px;
        }

        .card p{
            color:var(--secondary);
            line-height:1.5;
            margin-bottom:18px;
            min-height:48px;
        }

        .btn{
            display:inline-block;
            background:var(--gold);
            color:#121212;
            border:none;
            border-radius:10px;
            padding:12px 24px;
            font-size:.95rem;
            font-weight:bold;
            text-decoration:none;
            cursor:pointer;
        }

        .btn:hover{
            background:#e6c458;
        }

        .btn-secondary{
            background:transparent;
            border:1px solid var(--border);
            color:var(--text);
        }

        .btn-secondary:hover{
            background:transparent;
            border-color:var(--gold);
        }

        .btn-danger{
            background:transparent;
            border:1px solid #e5534b;
            color:#e5534b;
        }

        .btn-danger:hover{
            background:rgba(229,83,75,.15);
        }

        .card-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        [hidden]{
            display:none !important;
        }

        #delete-confirm-modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:1200;
            padding:20px;
        }

        #delete-confirm-modal .confirm-box{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:25px;
            max-width:420px;
            width:100%;
            text-align:center;
        }

        #delete-confirm-modal h2{
            margin-bottom:12px;
        }

        #delete-confirm-modal p{
            color:var(--secondary);
            margin-bottom:20px;
            line-height:1.5;
        }

        #delete-confirm-modal .modal-buttons{
            display:flex;
            gap:10px;
            justify-content:center;
        }

        #delete-password-field{
            text-align:left;
            margin-bottom:14px;
        }

        #delete-password-field label{
            display:block;
            margin-bottom:6px;
            color:var(--secondary);
            font-size:.9rem;
        }

        #delete-password-input{
            width:100%;
            padding:10px 12px;
            border-radius:8px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:1rem;
        }

        #delete-password-input:focus{
            outline:none;
            border-color:var(--gold);
        }

        #delete-confirm-error{
            background:rgba(229,83,75,.15);
            border:1px solid #e5534b;
            color:#e5534b;
            padding:10px 14px;
            border-radius:8px;
            margin-bottom:14px;
            text-align:left;
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script>
fetch('../navbar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('navbar').innerHTML = data;

        const basePath =
            window.location.hostname === "bladeinferior.github.io"
                ? "/harryswebsite/"
                : "/";

        document.querySelectorAll('#navbar [data-page]').forEach(link => {
            link.href = basePath + link.dataset.page;
        });
    });
</script>

<a class="back-button" href="quizhub.html">← Back</a>

<section class="hero">
    <h1>Manage Quizzes</h1>
    <p>Your quizzes, ready to run. Click Start Quiz to open the host screen and generate a join code.</p>
</section>

<section class="section">
    <div class="card-grid" id="quiz-list"></div>
</section>

<div id="delete-confirm-modal" hidden>
    <div class="confirm-box">
        <h2>Delete this quiz?</h2>
        <p id="delete-confirm-text">This can't be undone.</p>

        <div id="delete-confirm-error" hidden></div>

        <div id="delete-password-field" hidden>
            <label for="delete-password-input">Password</label>
            <input type="password" id="delete-password-input" autocomplete="current-password">
        </div>

        <div class="modal-buttons">
            <button id="confirm-delete-btn" class="btn btn-danger" type="button">Delete</button>
            <button id="cancel-delete-btn" class="btn btn-secondary" type="button">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="manage-quizzes.js"></script>

</body>
</html>
