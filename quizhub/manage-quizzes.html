<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Manage Quizzes</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#170f1c;
            --card:#2e1a3d;
            --card-2:#3d2450;
            --card-hover:#4a2d5e;
            --gold:#a855f7;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#3a2c40;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background-image:radial-gradient(circle at top, #7a2a5c, #3a1d5c 45%, var(--bg));
            background-attachment:fixed;
            background-color:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        .back-button{
            display:inline-block;
            margin:90px 0 0 20px;
            padding:6px 10px;
            border-radius:8px;
            background:var(--card);
            border:1px solid var(--gold);
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:.15s ease;
        }

        .back-button:hover{
            border-color:var(--gold);
            background:rgba(168,85,247,.15);
        }

        @media (min-width:769px){
            .back-button{
                position:sticky;
                top:90px;
                z-index:1000;
            }
        }

        .hero{
            text-align:center;
            padding:60px 20px 30px;
        }

        .hero h1{
            font-size:2rem;
            margin-bottom:10px;
        }

        .hero p{
            max-width:600px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        .section{
            max-width:1000px;
            margin:auto;
            padding:20px 20px 60px;
        }

        .card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:20px;
        }

        .card{
            background:linear-gradient(180deg, var(--card-2), var(--card));
            border:1px solid var(--border);
            border-radius:12px;
            padding:20px;
        }

        .card:hover{
            background:var(--card-hover);
            border-color:var(--gold);
        }

        .card h3{
            margin-bottom:8px;
            font-size:1.1rem;
        }

        .card p{
            color:var(--secondary);
            line-height:1.5;
            margin-bottom:18px;
            min-height:48px;
            font-size:14px;
        }

        .btn{
            display:inline-block;
            background:linear-gradient(135deg, #d0a3fc, #b565f5);
            box-shadow:0 0 14px rgba(181,101,245,.5);
            color:white;
            border:none;
            border-radius:8px;
            padding:10px 18px;
            font-size:14px;
            font-weight:bold;
            text-decoration:none;
            cursor:pointer;
        }

        .btn:hover:not(:disabled){
            background:linear-gradient(135deg, #e0c3ff, #d0a3fc);
            box-shadow:0 0 18px rgba(181,101,245,.65);
        }

        .btn:disabled{
            opacity:.45;
            cursor:default;
        }

        .btn-secondary{
            background:rgba(168,85,247,.3);
            border:1px solid var(--gold);
            color:var(--text);
        }

        .btn-secondary:hover:not(:disabled){
            background:rgba(168,85,247,.45);
            border-color:#c084fc;
        }

        .btn-danger{
            background:transparent;
            border:1px solid #e5534b;
            color:#e5534b;
            box-shadow:none;
            transition:.15s ease;
        }

        .btn.btn-danger:hover:not(:disabled){
            background:rgba(229,83,75,.25);
            border-color:#e5534b;
            color:#fff;
            box-shadow:0 0 14px rgba(229,83,75,.5);
            transform:translateY(-2px);
        }

        .card-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        [hidden]{
            display:none !important;
        }

        #delete-confirm-modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:1200;
            padding:20px;
        }

        #delete-confirm-modal .confirm-box{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:12px;
            padding:20px;
            max-width:420px;
            width:100%;
            text-align:center;
        }

        #delete-confirm-modal h2{
            margin-bottom:12px;
        }

        #delete-confirm-modal p{
            color:var(--secondary);
            margin-bottom:20px;
            line-height:1.5;
        }

        #delete-confirm-modal .modal-buttons{
            display:flex;
            gap:10px;
            justify-content:center;
        }

        #delete-password-field{
            text-align:left;
            margin-bottom:14px;
        }

        #delete-password-field label{
            display:block;
            margin-bottom:6px;
            color:var(--secondary);
            font-size:13px;
        }

        #delete-password-input{
            width:100%;
            padding:10px 12px;
            border-radius:8px;
            border:1px solid var(--border);
            background:var(--bg);
            color:var(--text);
            font-size:14px;
        }

        #delete-password-input:focus{
            outline:none;
            border-color:var(--gold);
        }

        #delete-confirm-error{
            background:rgba(229,83,75,.15);
            border:1px solid #e5534b;
            color:#e5534b;
            padding:10px 14px;
            border-radius:8px;
            margin-bottom:14px;
            text-align:left;
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script src="quiz-nav.js"></script>

<a class="back-button" href="quizhub.html">← Back</a>

<section class="hero">
    <h1>Manage Quizzes</h1>
    <p>Your quizzes, ready to run. Click Start Quiz to open the host screen and generate a join code.</p>
</section>

<section class="section">
    <div class="card-grid" id="quiz-list"></div>
</section>

<div id="delete-confirm-modal" hidden>
    <div class="confirm-box">
        <h2>Delete this quiz?</h2>
        <p id="delete-confirm-text">This can't be undone.</p>

        <div id="delete-confirm-error" hidden></div>

        <div id="delete-password-field" hidden>
            <label for="delete-password-input">Password</label>
            <input type="password" id="delete-password-input" autocomplete="current-password">
        </div>

        <div class="modal-buttons">
            <button id="confirm-delete-btn" class="btn btn-danger" type="button">Delete</button>
            <button id="cancel-delete-btn" class="btn btn-secondary" type="button">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="manage-quizzes.js"></script>

<script src="../scroll-to-top.js"></script>
</body>
</html>
