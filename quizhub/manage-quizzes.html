<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Manage Quizzes</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#121212;
            --card:#1e1e1e;
            --card-hover:#262626;
            --gold:#d4af37;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#333;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        .hero{
            text-align:center;
            padding:60px 20px 30px;
        }

        .hero h1{
            font-size:2.2rem;
            margin-bottom:10px;
        }

        .hero p{
            max-width:600px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        .section{
            max-width:1000px;
            margin:auto;
            padding:20px 20px 60px;
        }

        .card-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:20px;
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:25px;
        }

        .card:hover{
            background:var(--card-hover);
            border-color:var(--gold);
        }

        .card h3{
            margin-bottom:10px;
        }

        .card p{
            color:var(--secondary);
            line-height:1.5;
            margin-bottom:18px;
            min-height:48px;
        }

        .btn{
            display:inline-block;
            background:var(--gold);
            color:#121212;
            border:none;
            border-radius:10px;
            padding:12px 24px;
            font-size:.95rem;
            font-weight:bold;
            text-decoration:none;
            cursor:pointer;
        }

        .btn:hover{
            background:#e6c458;
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script>
fetch('../navbar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('navbar').innerHTML = data;

        const basePath =
            window.location.hostname === "bladeinferior.github.io"
                ? "/harryswebsite/"
                : "/";

        document.querySelectorAll('#navbar [data-page]').forEach(link => {
            link.href = basePath + link.dataset.page;
        });
    });
</script>

<a class="back-button" href="quizhub.html">← Back</a>

<section class="hero">
    <h1>Manage Quizzes</h1>
    <p>Your quizzes, ready to run. Click Start Quiz to open the host screen and generate a join code.</p>
</section>

<section class="section">
    <div class="card-grid" id="quiz-list"></div>
</section>

<script type="module" src="manage-quizzes.js"></script>

</body>
</html>
