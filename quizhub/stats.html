<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Stats</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#121212;
            --card:#1e1e1e;
            --card-hover:#262626;
            --gold:#d4af37;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#333;
            --correct:#3fb950;
            --incorrect:#e5534b;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        [hidden]{
            display:none !important;
        }

        .back-button{
            display:inline-block;
            margin:90px 0 0 20px;
            padding:6px 10px;
            border-radius:8px;
            background:#2d2d2d;
            border:1px solid #555;
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:.15s ease;
        }

        .back-button:hover{
            border-color:var(--gold);
            background:rgba(212,175,55,.15);
        }

        .hero{
            text-align:center;
            padding:60px 20px 20px;
        }

        .hero p{
            max-width:600px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        .section{
            max-width:800px;
            margin:auto;
            padding:20px 20px 80px;
        }

        #tabs{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:10px;
            margin-bottom:24px;
        }

        .tab-btn{
            background:transparent;
            border:1px solid rgba(212,175,55,.4);
            color:#fff;
            padding:8px 20px;
            border-radius:20px;
            font-size:.95rem;
            cursor:pointer;
            transition:.2s;
        }

        .tab-btn:hover{
            border-color:var(--gold);
        }

        .tab-active{
            background:var(--gold);
            color:#121212;
            font-weight:bold;
            border-color:var(--gold);
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:20px;
        }

        .empty-hint{
            color:var(--secondary);
            text-align:center;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            text-align:left;
            padding:10px 12px;
            border-bottom:1px solid var(--border);
            font-size:.95rem;
        }

        th{
            color:var(--gold);
            font-size:.8rem;
            text-transform:uppercase;
            letter-spacing:.03em;
        }

        tr:last-child td{
            border-bottom:none;
        }

        .result-row{
            border:1px solid var(--border);
            border-radius:10px;
            padding:14px 16px;
            margin-bottom:10px;
            cursor:pointer;
        }

        .result-row:hover{
            border-color:var(--gold);
        }

        .result-row-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .result-title{
            font-weight:bold;
        }

        .result-meta{
            color:var(--secondary);
            font-size:.85rem;
        }

        .result-players{
            margin-top:12px;
            padding-top:12px;
            border-top:1px solid var(--border);
            display:flex;
            flex-direction:column;
            gap:6px;
        }

        .result-player-row{
            display:flex;
            justify-content:space-between;
            font-size:.9rem;
        }

        .outcome-badge{
            padding:2px 10px;
            border-radius:12px;
            font-size:.75rem;
            font-weight:bold;
        }

        .outcome-win{
            background:rgba(63,185,80,.15);
            border:1px solid var(--correct);
            color:var(--correct);
        }

        .outcome-draw{
            background:rgba(212,175,55,.15);
            border:1px solid var(--gold);
            color:var(--gold);
        }

        .outcome-loss{
            background:rgba(229,83,75,.15);
            border:1px solid var(--incorrect);
            color:var(--incorrect);
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script>
fetch('../navbar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('navbar').innerHTML = data;

        const basePath =
            window.location.hostname === "bladeinferior.github.io"
                ? "/harryswebsite/"
                : "/";

        document.querySelectorAll('#navbar [data-page]').forEach(link => {
            link.href = basePath + link.dataset.page;
        });
    });
</script>

<a class="back-button" href="quizhub.html">← Back</a>

<section class="hero">
    <h1>📊 Stats</h1>
    <p>Match history, the leaderboard, and everyone's personal bests.</p>
</section>

<section class="section">

    <div id="tabs">
        <button class="tab-btn" data-tab="recent" type="button">Recent Quizzes</button>
        <button class="tab-btn" data-tab="leaderboard" type="button">Leaderboard</button>
        <button class="tab-btn" data-tab="individual" type="button">Individual Stats</button>
    </div>

    <div id="tab-recent" class="card" hidden>
        <div id="recent-list"></div>
    </div>

    <div id="tab-leaderboard" class="card" hidden>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Wins</th>
                    <th>Draws</th>
                    <th>Losses</th>
                    <th>Win %</th>
                    <th>Total Points</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <div id="leaderboard-empty" class="empty-hint" hidden>No games played yet.</div>
    </div>

    <div id="tab-individual" class="card" hidden>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Best Score</th>
                    <th>Total Points</th>
                    <th>Games Played</th>
                </tr>
            </thead>
            <tbody id="individual-body"></tbody>
        </table>
        <div id="individual-empty" class="empty-hint" hidden>No games played yet.</div>
    </div>

</section>

<script type="module" src="stats.js"></script>

</body>
</html>
