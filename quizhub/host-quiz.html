<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Hub — Host</title>

    <link rel="stylesheet" href="../navbar.css">

    <style>
        :root{
            --bg:#121212;
            --card:#1e1e1e;
            --gold:#d4af37;
            --text:#ffffff;
            --secondary:#bdbdbd;
            --border:#333;
            --correct:#3fb950;
            --incorrect:#e5534b;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        .back-button{
            display:inline-block;
            margin:90px 0 0 20px;
            padding:6px 10px;
            border-radius:8px;
            background:#2d2d2d;
            border:1px solid #555;
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:.15s ease;
        }

        .back-button:hover{
            border-color:var(--gold);
            background:rgba(212,175,55,.15);
        }

        .hero{
            text-align:center;
            padding:100px 20px 10px;
        }

        .hero h1{
            font-size:2.4rem;
            margin-bottom:10px;
        }

        .hero p{
            max-width:650px;
            margin:auto;
            color:var(--secondary);
            line-height:1.6;
        }

        [hidden]{
            display:none !important;
        }

        .layout{
            max-width:1000px;
            margin:auto;
            padding:30px 20px 60px;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:24px;
        }

        @media (max-width:700px){
            .layout{
                grid-template-columns:1fr;
            }
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:25px;
        }

        .full-width{
            grid-column:1 / -1;
        }

        .code-card{
            text-align:center;
        }

        .code-card p{
            color:var(--secondary);
            margin-bottom:10px;
        }

        #code-display{
            font-size:4rem;
            font-weight:bold;
            letter-spacing:8px;
            color:var(--gold);
            margin-bottom:20px;
        }

        #join-qr-img{
            display:block;
            margin:0 auto 10px;
            border-radius:12px;
            background:#fff;
            padding:10px;
            width:180px;
            height:180px;
        }

        #join-qr-caption{
            margin-bottom:20px;
        }

        .btn{
            background:var(--gold);
            color:#121212;
            border:none;
            border-radius:10px;
            padding:14px 32px;
            font-size:1.05rem;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover:not(:disabled){
            background:#e6c458;
        }

        .btn:disabled{
            opacity:.5;
            cursor:default;
        }

        .btn-secondary{
            background:transparent;
            border:1px solid var(--border);
            color:var(--text);
        }

        .btn-secondary:hover:not(:disabled){
            border-color:var(--gold);
            background:transparent;
        }

        .btn-small{
            padding:6px 16px;
            font-size:.85rem;
        }

        .card h2{
            margin-bottom:15px;
            font-size:1.1rem;
            color:var(--secondary);
        }

        #player-list,
        #message-list,
        #results-list,
        #scoreboard-list{
            list-style:none;
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        #player-list li,
        #message-list li,
        #results-list li,
        #scoreboard-list li{
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:8px;
            padding:10px 14px;
        }

        #player-list:empty::after{
            content:"No one has joined yet.";
            color:var(--secondary);
        }

        #message-list:empty::after{
            content:"No messages yet.";
            color:var(--secondary);
        }

        #results-list li.correct{
            border-color:var(--correct);
            background:rgba(63,185,80,.15);
        }

        #results-list li.incorrect{
            border-color:var(--incorrect);
            background:rgba(229,83,75,.15);
        }

        #results-list li{
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        #results-list li.no-answer{
            color:var(--secondary);
        }

        #locked-controls{
            margin-top:16px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:14px;
        }

        #correct-answer-display{
            color:var(--gold);
            font-weight:bold;
            font-size:1.1rem;
        }

        .question-card{
            text-align:center;
        }

        #question-progress{
            color:var(--secondary);
            margin-bottom:10px;
        }

        #host-question-prompt{
            font-size:1.6rem;
            margin-bottom:20px;
            line-height:1.4;
        }

        #host-question-media img{
            display:block;
            max-width:220px;
            max-height:220px;
            margin:0 auto 20px;
            border-radius:8px;
        }

        #host-question-media img.silhouette{
            filter:brightness(0);
        }

        #answer-count{
            color:var(--secondary);
            margin-bottom:16px;
        }

        #ended-view{
            text-align:center;
        }

        #ended-view h2{
            margin-bottom:20px;
        }

        #results-reveal-list{
            list-style:none;
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:16px;
        }

        #results-reveal-list li{
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:10px;
            padding:14px 18px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }

        .done-tag{
            color:var(--secondary);
            font-size:.85rem;
        }

        .result-pos{
            font-weight:bold;
            color:var(--gold);
            min-width:36px;
        }

        .result-score,
        .result-name{
            flex:1;
        }

        /* ---------- category tiles (interactive map) ---------- */
        #category-select-view{
            max-width:1300px;
        }

        #category-select-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:24px;
            margin-bottom:20px;
        }

        .category-tile{
            position:relative;
            aspect-ratio:1;
            min-height:240px;
            border-radius:20px;
            border:2px solid var(--border);
            background-color:var(--bg);
            background-size:cover;
            background-position:center;
            color:#fff;
            font-size:2rem;
            font-weight:bold;
            font-family:inherit;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
            cursor:pointer;
            text-align:center;
            overflow:hidden;
            transition:.15s ease;
        }

        .category-tile::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(0,0,0,.55);
            z-index:0;
        }

        .category-tile span{
            position:relative;
            z-index:1;
            line-height:1.3;
        }

        .category-tile:hover:not(:disabled){
            border-color:var(--gold);
            transform:translateY(-3px) scale(1.02);
        }

        .category-tile:disabled{
            cursor:default;
            filter:grayscale(1);
            opacity:.55;
        }

        .category-tile .done-tag{
            position:absolute;
            top:12px;
            right:12px;
            z-index:1;
            background:rgba(0,0,0,.6);
            padding:4px 10px;
            border-radius:8px;
        }

        /* ---------- category title / example screens ---------- */
        #category-intro-view .card{
            text-align:center;
        }

        #category-intro-label{
            font-size:1.8rem;
            margin-bottom:16px;
        }

        #category-intro-text{
            color:var(--secondary);
            max-width:500px;
            margin:0 auto 24px;
            line-height:1.6;
        }

        /* ---------- question-card themed background ---------- */
        .question-card.themed-bg{
            position:relative;
            background-size:cover;
            background-position:center;
            overflow:hidden;
        }

        .question-card.themed-bg::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(18,18,18,.82);
            border-radius:16px;
            z-index:0;
        }

        .question-card.themed-bg > *{
            position:relative;
            z-index:1;
        }
    </style>
</head>

<body>

<div id="navbar"></div>

<script>
fetch('../navbar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('navbar').innerHTML = data;

        const basePath =
            window.location.hostname === "bladeinferior.github.io"
                ? "/harryswebsite/"
                : "/";

        document.querySelectorAll('#navbar [data-page]').forEach(link => {
            link.href = basePath + link.dataset.page;
        });
    });
</script>

<a class="back-button" href="manage-quizzes.html">← Back</a>

<section class="hero">
    <h1 id="quiz-title">Loading quiz...</h1>
    <p id="quiz-description"></p>
</section>

<div id="lobby-view" class="layout">

    <div class="card code-card full-width">
        <p>Join code</p>
        <div id="code-display">----</div>
        <img id="join-qr-img" alt="QR code to join the quiz" hidden>
        <p id="join-qr-caption">Or scan to join</p>
        <button id="begin-btn" class="btn">Begin Quiz</button>
    </div>

    <div class="card">
        <h2>Players joined</h2>
        <ul id="player-list"></ul>
    </div>

    <div class="card">
        <h2>Messages</h2>
        <ul id="message-list"></ul>
    </div>

</div>

<div id="category-select-view" class="layout" hidden>
    <div class="card full-width">
        <h2>Choose a category to play</h2>
        <div id="category-select-grid"></div>
        <button id="go-to-results-btn" class="btn" style="margin-top:6px;" hidden>Go to Results</button>
    </div>
</div>

<div id="category-intro-view" class="layout" hidden>
    <div class="card full-width">
        <h2 id="category-intro-label"></h2>
        <p id="category-intro-text"></p>
        <button id="category-intro-continue-btn" class="btn">Continue</button>
    </div>
</div>

<div id="quiz-view" class="layout" hidden>

    <div class="card question-card full-width">
        <p id="question-progress"></p>
        <h2 id="host-question-prompt"></h2>
        <div id="host-question-media"></div>
        <p id="answer-count"></p>

        <button id="lock-btn" class="btn">Lock Answers</button>

        <div id="locked-controls" hidden>
            <button id="reveal-answer-btn" class="btn btn-secondary">Reveal Correct Answer</button>
            <p id="correct-answer-display" hidden></p>
            <button id="start-review-btn" class="btn btn-secondary">Reveal Answers</button>
            <button id="next-question-btn" class="btn">Next Question</button>
        </div>
    </div>

    <div class="card">
        <h2>Results</h2>
        <ul id="results-list"></ul>
    </div>

    <div class="card">
        <h2>Scoreboard</h2>
        <ul id="scoreboard-list"></ul>
    </div>

</div>

<div id="results-view" class="layout" hidden>
    <div class="card full-width">
        <h2>Final Results</h2>
        <ul id="results-reveal-list"></ul>
        <button id="finish-quiz-btn" class="btn" style="margin-top:6px;">Finish Quiz</button>
    </div>
</div>

<div id="ended-view" class="layout" hidden>
    <div class="card full-width">
        <h2>Quiz Complete!</h2>
        <ul id="final-scoreboard-list"></ul>
    </div>
</div>

<script src="engine/answer-types.js"></script>
<script type="module" src="host-quiz.js"></script>

</body>
</html>
