<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Steelbooks</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body class="item-page steelbooks-page">

    <h1>Steelbooks</h1>

    <!-- =========================
        SEARCH
    ========================== -->
    <div id="search-wrapper">
        <input id="search" type="text" placeholder="Search Steelbooks..." />
        <span id="clear-search">✕</span>
    </div>

    <a id="home-icon" href="index.html" title="Home">🏠</a>

    <button id="untagged-filter">Untagged</button>

    <!-- =========================
        MODE + PAGINATION 
    ========================== -->

    
    <div id="page-controls">

        <button id="list-mode">List Mode</button>
        <button id="page-mode">Page Mode</button>

        <div id="pagination-controls">

            <button id="prev-page">◀</button>
            <span id="page-display">1</span>
            <button id="next-page">▶</button>

        </div>

        <button id="add-item">Add Steelbook</button>
        <input type="file" id="import-items" accept=".json" hidden>
        <button id="import-button">Import</button>
        <button id="export-items">Export</button>

    </div>

    <!-- =========================
        GRID
    ========================== -->
    <div id="box-container"></div>

    <div id="add-item-modal" class="hidden">

        <div class="add-item-box">

            <h2 id="item-modal-title">Add Steelbook</h2>

            <div id="item-error" class="hidden"></div>

            <label>
                Title
                <input type="text" id="item-title">
            </label>

            <label>
                Release Date
                <input type="date" id="item-date">
            </label>

            <label>
                Franchise
                <input type="text" id="item-custom">
            </label>

            <label>
                Tags (comma separated)
                <input type="text" id="item-tags">
            </label>

            <button id="preview-image-btn">View Image</button>

            <div class="modal-buttons">
                <button id="save-item">Save</button>
                <button id="cancel-item">Cancel</button>
            </div>

        </div>

    </div>

    <!-- =========================
        MODAL
    ========================== -->
    <div id="modal-overlay" class="hidden">

        <div id="modal-nav-left" class="modal-nav">◀</div>

        <div id="pokemon-modal">

            <div class="modal-left">

                <div id="modal-title"></div>

                <img id="modal-image" src="">

            </div>

            <div class="modal-right">

                <div class="item-field">
                    <strong>Release Date:</strong>
                    <div id="modal-date"></div>
                </div>

                <div class="item-field">
                    <strong>Franchise:</strong>
                    <div id="modal-custom"></div>
                </div>

                <div class="item-field">
                    <strong>Tags:</strong>
                    <div id="modal-tags"></div>
                </div>

                <div class="item-actions">

                    <button id="edit-item" class="item-action-btn">Edit Steelbook</button>
                    <button id="delete-item" class="item-action-btn danger">Delete Steelbook</button>

                </div>

            </div>

        </div>

        <div id="modal-nav-right" class="modal-nav">◀</div>

    </div>

    <div id="image-zoom-overlay" class="hidden">
        <img id="zoom-image" />
    </div>

    <script>
    const COLLECTION = {
    name: "steelbooks",
    storageKey: "steelbooks",
    jsonFile: "steelbooks-backup.json",
    imageFolder: "steelbooks",

        fields: {
            title: "title",
            date: "releaseDate",
            secondary: "franchise",
            tags: "tags"
        }
    };
    </script>

    <script src="collections.js"></script>

</body>
</html>
